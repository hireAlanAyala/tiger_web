<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiger Web — Data Flow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    overflow-x: hidden;
  }
  h1 {
    text-align: center;
    padding: 24px 0 8px;
    font-size: 20px;
    color: #58a6ff;
    letter-spacing: 1px;
  }
  .subtitle {
    text-align: center;
    font-size: 12px;
    color: #484f58;
    padding-bottom: 16px;
  }
  svg { display: block; margin: 0 auto; }

  /* Detail panel */
  #detail {
    position: fixed;
    right: 24px;
    top: 24px;
    width: 340px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 16px;
    font-size: 12px;
    line-height: 1.6;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 10;
    max-height: calc(100vh - 48px);
    overflow-y: auto;
  }
  #detail.visible { opacity: 1; pointer-events: auto; }
  #detail h3 {
    color: #58a6ff;
    font-size: 14px;
    margin-bottom: 8px;
    border-bottom: 1px solid #21262d;
    padding-bottom: 6px;
  }
  #detail .file {
    color: #7ee787;
    font-size: 11px;
    margin-bottom: 8px;
  }
  #detail .section {
    margin-bottom: 10px;
  }
  #detail .label {
    color: #f0883e;
    font-weight: bold;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  #detail code {
    display: block;
    background: #0d1117;
    border: 1px solid #21262d;
    border-radius: 4px;
    padding: 8px;
    margin-top: 4px;
    font-size: 11px;
    line-height: 1.5;
    white-space: pre;
    color: #c9d1d9;
    overflow-x: auto;
  }
  #detail .hint {
    color: #484f58;
    font-size: 10px;
    margin-top: 12px;
    text-align: center;
  }

  /* Legend */
  .legend {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 12px 0 4px;
    font-size: 11px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-swatch {
    width: 24px;
    height: 4px;
    border-radius: 2px;
  }
</style>
</head>
<body>

<h1>Tiger Web Data Flow</h1>
<p class="subtitle">Click any stage to see data shapes. Request flows left-to-right, response right-to-left.</p>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#58a6ff"></div> Request path</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#f0883e"></div> Response path</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#7ee787"></div> Storage</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#484f58"></div> Boundary data</div>
</div>

<svg id="diagram" width="1100" height="620" viewBox="0 0 1100 620">
  <defs>
    <!-- Arrow markers -->
    <marker id="arrow-req" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-resp" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#f0883e"/>
    </marker>
    <marker id="arrow-storage" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7ee787"/>
    </marker>
    <marker id="arrow-storage-up" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#7ee787"/>
    </marker>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Animated dash for request flow -->
    <style>
      @keyframes dash-req {
        to { stroke-dashoffset: -20; }
      }
      @keyframes dash-resp {
        to { stroke-dashoffset: 20; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      .flow-req {
        stroke-dasharray: 6 4;
        animation: dash-req 1s linear infinite;
      }
      .flow-resp {
        stroke-dasharray: 6 4;
        animation: dash-resp 1s linear infinite;
      }
      .stage {
        cursor: pointer;
        transition: filter 0.15s;
      }
      .stage:hover { filter: url(#glow); }
      .stage-box {
        rx: 6;
        ry: 6;
      }
      .data-label {
        font-size: 9px;
        fill: #484f58;
        font-family: 'SF Mono', monospace;
      }
      .stage-title {
        font-size: 13px;
        font-weight: bold;
        font-family: 'SF Mono', monospace;
      }
      .stage-sub {
        font-size: 10px;
        font-family: 'SF Mono', monospace;
      }
    </style>
  </defs>

  <!-- ==================== REQUEST PATH (top) ==================== -->

  <!-- Client -->
  <g class="stage" data-stage="client">
    <rect class="stage-box" x="20" y="80" width="100" height="70" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text class="stage-title" x="70" y="112" text-anchor="middle" fill="#c9d1d9">Client</text>
    <text class="stage-sub" x="70" y="128" text-anchor="middle" fill="#484f58">HTTP req</text>
  </g>

  <!-- Arrow: Client -> IO -->
  <line x1="120" y1="115" x2="158" y2="115" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-req)" class="flow-req"/>
  <text class="data-label" x="139" y="107">TCP bytes</text>

  <!-- IO / Connection -->
  <g class="stage" data-stage="io">
    <rect class="stage-box" x="160" y="80" width="120" height="70" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.5"/>
    <text class="stage-title" x="220" y="107" text-anchor="middle" fill="#58a6ff">io.zig</text>
    <text class="stage-sub" x="220" y="122" text-anchor="middle" fill="#484f58">epoll recv</text>
    <text class="stage-sub" x="220" y="136" text-anchor="middle" fill="#484f58">connection.zig</text>
  </g>

  <!-- Arrow: IO -> HTTP -->
  <line x1="280" y1="115" x2="318" y2="115" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-req)" class="flow-req"/>
  <text class="data-label" x="299" y="107">recv_buf</text>

  <!-- HTTP Parser -->
  <g class="stage" data-stage="http">
    <rect class="stage-box" x="320" y="80" width="110" height="70" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.5"/>
    <text class="stage-title" x="375" y="107" text-anchor="middle" fill="#58a6ff">http.zig</text>
    <text class="stage-sub" x="375" y="122" text-anchor="middle" fill="#484f58">parse_request</text>
    <text class="stage-sub" x="375" y="136" text-anchor="middle" fill="#484f58">pure parser</text>
  </g>

  <!-- Arrow: HTTP -> Auth -->
  <line x1="430" y1="115" x2="468" y2="115" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-req)" class="flow-req"/>
  <text class="data-label" x="438" y="107">ParseResult</text>

  <!-- Auth Gate -->
  <g class="stage" data-stage="auth">
    <rect class="stage-box" x="470" y="80" width="90" height="70" fill="#161b22" stroke="#da3633" stroke-width="1.5" stroke-opacity="0.6"/>
    <text class="stage-title" x="515" y="107" text-anchor="middle" fill="#da3633">auth.zig</text>
    <text class="stage-sub" x="515" y="122" text-anchor="middle" fill="#484f58">JWT verify</text>
    <text class="stage-sub" x="515" y="136" text-anchor="middle" fill="#484f58">HMAC-SHA256</text>
  </g>

  <!-- Arrow: Auth -> Codec -->
  <line x1="560" y1="115" x2="598" y2="115" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-req)" class="flow-req"/>
  <text class="data-label" x="563" y="107">method,path,body</text>

  <!-- Codec (translate) -->
  <g class="stage" data-stage="codec">
    <rect class="stage-box" x="600" y="80" width="120" height="70" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.5"/>
    <text class="stage-title" x="660" y="107" text-anchor="middle" fill="#58a6ff">codec.zig</text>
    <text class="stage-sub" x="660" y="122" text-anchor="middle" fill="#484f58">translate()</text>
    <text class="stage-sub" x="660" y="136" text-anchor="middle" fill="#484f58">route + JSON parse</text>
  </g>

  <!-- Arrow: Codec -> Message -->
  <line x1="720" y1="115" x2="758" y2="115" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-req)" class="flow-req"/>
  <text class="data-label" x="730" y="107">Message</text>

  <!-- Message types -->
  <g class="stage" data-stage="message">
    <rect class="stage-box" x="760" y="80" width="110" height="70" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" stroke-opacity="0.5"/>
    <text class="stage-title" x="815" y="107" text-anchor="middle" fill="#d2a8ff">message.zig</text>
    <text class="stage-sub" x="815" y="122" text-anchor="middle" fill="#484f58">Operation</text>
    <text class="stage-sub" x="815" y="136" text-anchor="middle" fill="#484f58">Event (tagged)</text>
  </g>

  <!-- ==================== STATE MACHINE (center) ==================== -->

  <!-- Arrow: Message -> Prefetch -->
  <path d="M 815 150 L 815 195" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-req)" class="flow-req" fill="none"/>

  <!-- Prefetch -->
  <g class="stage" data-stage="prefetch">
    <rect class="stage-box" x="730" y="200" width="170" height="70" fill="#161b22" stroke="#7ee787" stroke-width="1.5" stroke-opacity="0.5"/>
    <text class="stage-title" x="815" y="225" text-anchor="middle" fill="#7ee787">state_machine.zig</text>
    <text class="stage-sub" x="815" y="242" text-anchor="middle" fill="#c9d1d9">prefetch(msg)</text>
    <text class="stage-sub" x="815" y="256" text-anchor="middle" fill="#484f58">read-only, cache fill</text>
  </g>

  <!-- Arrow: Prefetch -> Execute -->
  <path d="M 815 270 L 815 315" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-req)" class="flow-req" fill="none"/>
  <text class="data-label" x="820" y="298">cache slots</text>

  <!-- Execute -->
  <g class="stage" data-stage="execute">
    <rect class="stage-box" x="730" y="320" width="170" height="70" fill="#161b22" stroke="#7ee787" stroke-width="1.5" stroke-opacity="0.5"/>
    <text class="stage-title" x="815" y="345" text-anchor="middle" fill="#7ee787">state_machine.zig</text>
    <text class="stage-sub" x="815" y="362" text-anchor="middle" fill="#c9d1d9">commit(msg)</text>
    <text class="stage-sub" x="815" y="376" text-anchor="middle" fill="#484f58">decide + mutate</text>
  </g>

  <!-- ==================== STORAGE ==================== -->

  <!-- Storage -->
  <g class="stage" data-stage="storage">
    <rect class="stage-box" x="960" y="240" width="110" height="70" fill="#161b22" stroke="#7ee787" stroke-width="1.5" stroke-opacity="0.5"/>
    <text class="stage-title" x="1015" y="267" text-anchor="middle" fill="#7ee787">storage.zig</text>
    <text class="stage-sub" x="1015" y="282" text-anchor="middle" fill="#484f58">SQLite WAL</text>
    <text class="stage-sub" x="1015" y="296" text-anchor="middle" fill="#484f58">prepared stmts</text>
  </g>

  <!-- Arrow: Prefetch -> Storage (read) -->
  <line x1="900" y1="230" x2="958" y2="258" stroke="#7ee787" stroke-width="1.5" marker-end="url(#arrow-storage)" class="flow-req" stroke-opacity="0.7"/>
  <text class="data-label" x="920" y="233" fill="#7ee787">read</text>

  <!-- Arrow: Execute -> Storage (write) -->
  <line x1="900" y1="360" x2="958" y2="296" stroke="#7ee787" stroke-width="1.5" marker-end="url(#arrow-storage)" class="flow-resp" stroke-opacity="0.7"/>
  <text class="data-label" x="920" y="340" fill="#7ee787">write</text>

  <!-- ==================== RESPONSE PATH (bottom) ==================== -->

  <!-- Arrow: Execute -> MessageResponse -->
  <path d="M 730 355 L 680 355" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrow-resp)" class="flow-resp" fill="none"/>
  <text class="data-label" x="685" y="347">MessageResponse</text>

  <!-- MessageResponse -->
  <g class="stage" data-stage="response">
    <rect class="stage-box" x="560" y="320" width="120" height="70" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" stroke-opacity="0.5"/>
    <text class="stage-title" x="620" y="347" text-anchor="middle" fill="#d2a8ff">message.zig</text>
    <text class="stage-sub" x="620" y="362" text-anchor="middle" fill="#484f58">Status + Result</text>
    <text class="stage-sub" x="620" y="376" text-anchor="middle" fill="#484f58">(tagged union)</text>
  </g>

  <!-- Arrow: MessageResponse -> Render -->
  <path d="M 560 355 L 382 355" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrow-resp)" class="flow-resp" fill="none"/>

  <!-- Render (replaces codec_encode + http_encode) -->
  <g class="stage" data-stage="render">
    <rect class="stage-box" x="260" y="320" width="120" height="70" fill="#161b22" stroke="#f0883e" stroke-width="1.5" stroke-opacity="0.5"/>
    <text class="stage-title" x="320" y="342" text-anchor="middle" fill="#f0883e">render.zig</text>
    <text class="stage-sub" x="320" y="357" text-anchor="middle" fill="#c9d1d9">HTML or SSE</text>
    <text class="stage-sub" x="320" y="371" text-anchor="middle" fill="#484f58">always 200 OK</text>
  </g>

  <!-- Arrow: Render -> IO send -->
  <path d="M 260 355 L 142 355" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrow-resp)" class="flow-resp" fill="none"/>
  <text class="data-label" x="188" y="347">send_buf</text>

  <!-- IO send -->
  <g class="stage" data-stage="io_send">
    <rect class="stage-box" x="20" y="320" width="120" height="70" fill="#161b22" stroke="#f0883e" stroke-width="1.5" stroke-opacity="0.5"/>
    <text class="stage-title" x="80" y="342" text-anchor="middle" fill="#f0883e">io.zig</text>
    <text class="stage-sub" x="80" y="357" text-anchor="middle" fill="#484f58">epoll send</text>
    <text class="stage-sub" x="80" y="372" text-anchor="middle" fill="#484f58">connection.zig</text>
  </g>

  <!-- ==================== SERVER ORCHESTRATOR ==================== -->

  <!-- Server box (dashed, wrapping the pipeline) -->
  <rect x="150" y="55" width="780" height="360" rx="10" ry="10"
        fill="none" stroke="#30363d" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="160" y="48" font-size="11" fill="#30363d" font-family="'SF Mono', monospace">
    server.zig — tick: maybe_accept -> process_inbox -> process_followups -> flush_outbox -> close_dead
  </text>

  <!-- ==================== EXAMPLE FLOW (bottom section) ==================== -->

  <text x="40" y="460" font-size="13" fill="#58a6ff" font-weight="bold" font-family="'SF Mono', monospace">
    Example: PUT /products/:id  (update product, Datastar SSE mutation)
  </text>

  <!-- Step boxes -->
  <g font-family="'SF Mono', monospace" font-size="10">
    <!-- Step 1 -->
    <rect x="40" y="475" width="150" height="52" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="48" y="490" fill="#58a6ff" font-size="9" font-weight="bold">1. HTTP PARSE</text>
    <text x="48" y="503" fill="#c9d1d9">method: PUT</text>
    <text x="48" y="515" fill="#c9d1d9">path: /products/:id</text>

    <!-- Step 2 -->
    <rect x="200" y="475" width="150" height="52" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="208" y="490" fill="#58a6ff" font-size="9" font-weight="bold">2. CODEC TRANSLATE</text>
    <text x="208" y="503" fill="#c9d1d9">op: .update_product</text>
    <text x="208" y="515" fill="#c9d1d9">event: .product{...}</text>

    <!-- Step 3 -->
    <rect x="360" y="475" width="150" height="52" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="368" y="490" fill="#7ee787" font-size="9" font-weight="bold">3. PREFETCH + EXECUTE</text>
    <text x="368" y="503" fill="#c9d1d9">version check, merge</text>
    <text x="368" y="515" fill="#c9d1d9">storage.put(product)</text>

    <!-- Step 4 -->
    <rect x="520" y="475" width="150" height="52" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="528" y="490" fill="#f0883e" font-size="9" font-weight="bold">4. SSE FOLLOW-UP</text>
    <text x="528" y="503" fill="#c9d1d9">page_load_dashboard</text>
    <text x="528" y="515" fill="#c9d1d9">-> fresh list data</text>

    <!-- Step 5 -->
    <rect x="680" y="475" width="150" height="52" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="688" y="490" fill="#f0883e" font-size="9" font-weight="bold">5. RENDER</text>
    <text x="688" y="503" fill="#c9d1d9">encode_followup()</text>
    <text x="688" y="515" fill="#c9d1d9">SSE dashboard frags</text>

    <!-- Step 6 -->
    <rect x="840" y="475" width="150" height="52" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="848" y="490" fill="#f0883e" font-size="9" font-weight="bold">6. SEND</text>
    <text x="848" y="503" fill="#c9d1d9">HTTP/1.1 200 OK</text>
    <text x="848" y="515" fill="#c9d1d9">event: datastar-...</text>
  </g>

  <!-- Step arrows -->
  <line x1="190" y1="501" x2="198" y2="501" stroke="#484f58" stroke-width="1"/>
  <line x1="350" y1="501" x2="358" y2="501" stroke="#484f58" stroke-width="1"/>
  <line x1="510" y1="501" x2="518" y2="501" stroke="#484f58" stroke-width="1"/>
  <line x1="670" y1="501" x2="678" y2="501" stroke="#484f58" stroke-width="1"/>
  <line x1="830" y1="501" x2="838" y2="501" stroke="#484f58" stroke-width="1"/>

  <!-- ==================== OPERATION DISPATCH TABLE ==================== -->

  <text x="40" y="560" font-size="12" fill="#d2a8ff" font-weight="bold" font-family="'SF Mono', monospace">
    Operation dispatch — comptime EventType resolution
  </text>

  <g font-family="'SF Mono', monospace" font-size="9.5">
    <text x="40"  y="580" fill="#484f58">create_product</text>
    <text x="170" y="580" fill="#c9d1d9">Product</text>
    <text x="270" y="580" fill="#484f58">get_product</text>
    <text x="380" y="580" fill="#c9d1d9">void</text>
    <text x="460" y="580" fill="#484f58">list_products</text>
    <text x="580" y="580" fill="#c9d1d9">ListParams</text>
    <text x="700" y="580" fill="#484f58">transfer_inventory</text>
    <text x="850" y="580" fill="#c9d1d9">InventoryTransfer</text>

    <text x="40"  y="598" fill="#484f58">create_collection</text>
    <text x="170" y="598" fill="#c9d1d9">ProductCollection</text>
    <text x="270" y="598" fill="#484f58">create_order</text>
    <text x="380" y="598" fill="#c9d1d9">OrderRequest</text>
    <text x="460" y="598" fill="#484f58">add_member</text>
    <text x="580" y="598" fill="#c9d1d9">u128</text>
    <text x="700" y="598" fill="#484f58">delete_product</text>
    <text x="850" y="598" fill="#c9d1d9">void</text>
  </g>
</svg>

<div id="detail">
  <h3 id="detail-title"></h3>
  <div class="file" id="detail-file"></div>
  <div id="detail-body"></div>
  <div class="hint">Click elsewhere to close</div>
</div>

<script>
const details = {
  client: {
    title: 'Client',
    file: '',
    body: `<div class="section">
  <span class="label">Sends (browser / Datastar)</span>
  <code>PUT /products/550e8400-e29b... HTTP/1.1\r\n
Content-Length: 82\r\n
Authorization: Bearer eyJhbGc...\r\n
Datastar-Request: true\r\n
\r\n
{"name":"Shirt","price_cents":1999,...}</code>
</div>
<div class="section">
  <span class="label">Receives — HTML page (non-Datastar)</span>
  <code>HTTP/1.1 200 OK\r\n
Content-Length: 4821\r\n
Content-Type: text/html\r\n
Connection: keep-alive\r\n
\r\n
&lt;!DOCTYPE html&gt;&lt;html&gt;...&lt;/html&gt;</code>
</div>
<div class="section">
  <span class="label">Receives — SSE (Datastar)</span>
  <code>HTTP/1.1 200 OK\r\n
Content-Type: text/event-stream\r\n
Connection: close\r\n
\r\n
event: datastar-patch-elements
data: selector #products
data: elements &lt;div class="card"&gt;...
\n</code>
</div>`
  },
  io: {
    title: 'IO + Connection',
    file: 'io.zig, connection.zig',
    body: `<div class="section">
  <span class="label">IO layer</span>
  <code>epoll_wait() -> ready fds
recv(fd, recv_buf[recv_pos..]) -> n bytes
send(fd, send_buf[send_pos..send_len])</code>
</div>
<div class="section">
  <span class="label">Connection state machine</span>
  <code>free -> accepting -> receiving -> ready
  -> sending -> (keep-alive? receiving : closing)</code>
</div>
<div class="section">
  <span class="label">Buffers (fixed, no alloc)</span>
  <code>recv_buf: [12288]u8  (8K headers + 4K body)
send_buf: [65936]u8  (400 headers + 64K body)</code>
</div>
<div class="section">
  <span class="label">Follow-up fields</span>
  <code>pending_followup: bool
followup_operation: Operation
followup_status: Status</code>
</div>`
  },
  http: {
    title: 'HTTP Parser',
    file: 'http.zig',
    body: `<div class="section">
  <span class="label">Input</span>
  <code>recv_buf[0..recv_pos]  (raw bytes)</code>
</div>
<div class="section">
  <span class="label">Output — ParseResult</span>
  <code>union(enum) {
  .incomplete,       // need more bytes
  .invalid,          // close connection
  .complete: struct {
    method: Method,       // get|put|post|delete
    path: []const u8,     // "/products/550e..."
    body: []const u8,     // JSON bytes
    total_len: u32,       // bytes consumed
    keep_alive: bool,     // HTTP/1.1 default
    authorization: ?[]const u8,  // Bearer token
    is_datastar_request: bool,
  },
}</code>
</div>
<div class="section">
  <span class="label">Key</span>
  Pure parser — no side effects, no logging, no allocations.
  No response encoding. Slices point into recv_buf.
</div>`
  },
  auth: {
    title: 'Auth Gate',
    file: 'auth.zig, render.zig',
    body: `<div class="section">
  <span class="label">Input</span>
  <code>token: []const u8  (from Authorization header)
now: i64           (wall clock seconds)</code>
</div>
<div class="section">
  <span class="label">Process</span>
  <code>1. Base64-decode header.payload.signature
2. HMAC-SHA256 verify signature
3. Check exp > now (not expired)
4. Return claims or null</code>
</div>
<div class="section">
  <span class="label">Reject path (always 200)</span>
  <code>status: .unauthorized (message.Status)
render.encode_response(page_load_dashboard, resp):
  non-SSE -> 200 + full dashboard page (token input)
  SSE     -> 200 + SSE error "Unauthorized"
(short-circuits, never reaches codec)</code>
</div>`
  },
  codec: {
    title: 'Codec — Request Translation',
    file: 'codec.zig : translate()',
    body: `<div class="section">
  <span class="label">Input</span>
  <code>method: Method        // HTTP verb
path:   []const u8    // "/products/550e..."
body:   []const u8    // raw JSON</code>
</div>
<div class="section">
  <span class="label">Process</span>
  <code>1. Split path into segments
   /resource/:id/sub/:sub_id
2. Match resource -> flat Operation
   PUT + /products/:id -> .update_product
3. Parse UUID from path segment
4. JSON -> typed Event (Product, ListParams, ...)</code>
</div>
<div class="section">
  <span class="label">Output — Message</span>
  <code>Message {
  operation: .update_product,
  id: 0x550e8400e29b...,  // u128 from path
  event: .{ .product = Product{
    name: "Shirt",
    price_cents: 1999,
    ...
  }},
}</code>
</div>
<div class="section">
  <span class="label">Key</span>
  Request-only. No response encoding — render.zig
  handles all output.
</div>`
  },
  message: {
    title: 'Message Types',
    file: 'message.zig',
    body: `<div class="section">
  <span class="label">Message (request)</span>
  <code>operation: Operation  // flat enum(u8)
id:        u128       // entity UUID
event:     Event      // tagged union</code>
</div>
<div class="section">
  <span class="label">Event variants</span>
  <code>.product:   Product          (672 bytes, extern)
.collection: ProductCollection (160 bytes, extern)
.member_id: u128
.transfer:  InventoryTransfer (32 bytes, extern)
.order:     OrderRequest      (variable items)
.list:      ListParams        (160 bytes, extern)
.none:      void              (get/delete by ID)</code>
</div>
<div class="section">
  <span class="label">Comptime dispatch</span>
  <code>Operation.EventType(.update_product) == Product
// compiler resolves at build time</code>
</div>`
  },
  prefetch: {
    title: 'State Machine — Prefetch',
    file: 'state_machine.zig : prefetch(msg)',
    body: `<div class="section">
  <span class="label">Purpose</span>
  Read-only phase. Loads data from storage into
  fixed cache slots. Never mutates storage.
</div>
<div class="section">
  <span class="label">Cache slots</span>
  <code>prefetch_product:      ?Product
prefetch_product_list: ProductList
prefetch_products:     [20]?Product
prefetch_collection:   ?ProductCollection
prefetch_collection_list: CollectionList
prefetch_order:        ?OrderResult
prefetch_order_list:   OrderSummaryList
prefetch_result:       ?StorageResult</code>
</div>
<div class="section">
  <span class="label">Returns</span>
  <code>true  -> cache filled, ready for commit()
false -> storage busy, retry next tick</code>
</div>`
  },
  execute: {
    title: 'State Machine — Execute',
    file: 'state_machine.zig : commit(msg)',
    body: `<div class="section">
  <span class="label">Purpose</span>
  Decision + mutation phase. Reads from cache
  slots (filled by prefetch), applies business
  logic, writes to storage.
</div>
<div class="section">
  <span class="label">Example: update_product</span>
  <code>1. Read prefetch_product (existing)
2. Assert version matches (optimistic lock)
3. Merge fields from event into existing
4. Bump version
5. storage.put(updated_product)
6. Return .{ .ok, .product = updated }</code>
</div>
<div class="section">
  <span class="label">Output — MessageResponse</span>
  <code>MessageResponse {
  status: .ok | .not_found | .storage_error
          | .insufficient_inventory
          | .version_conflict,
  result: Result (tagged union),
}</code>
</div>`
  },
  storage: {
    title: 'Storage Backend',
    file: 'storage.zig (prod) / state_machine.zig MemoryStorage (sim)',
    body: `<div class="section">
  <span class="label">SqliteStorage (production)</span>
  <code>WAL mode, prepared statements
Tables: products, collections,
        collection_members, orders, order_items</code>
</div>
<div class="section">
  <span class="label">MemoryStorage (simulation)</span>
  <code>In-memory hash maps
PRNG fault injection:
  .busy  -> prefetch returns false
  .err   -> StorageResult.err</code>
</div>
<div class="section">
  <span class="label">Interface</span>
  <code>get(id)    -> ?Product | StorageResult
put(item)  -> StorageResult
delete(id) -> StorageResult
list(params) -> ProductList | StorageResult</code>
</div>`
  },
  response: {
    title: 'MessageResponse Types',
    file: 'message.zig',
    body: `<div class="section">
  <span class="label">Status</span>
  <code>enum(u8) {
  ok                    = 1,
  not_found             = 2,
  storage_error         = 4,
  insufficient_inventory = 10,
  version_conflict      = 11,
}</code>
</div>
<div class="section">
  <span class="label">Result (tagged union)</span>
  <code>.product:         Product
.product_list:    ProductList    {[50]Product, len}
.inventory:       u32
.collection:      CollectionWithProducts
.collection_list: CollectionList
.order:           OrderResult
.order_list:      OrderSummaryList
.page_load_dashboard: PageLoadDashboardResult
.empty:           void</code>
</div>
<div class="section">
  <span class="label">Always 200</span>
  Every status maps to HTTP 200 OK. The HTML body
  is the only error channel. See design/002-always-200.md.
</div>`
  },
  render: {
    title: 'Render — Response Encoding',
    file: 'render.zig',
    body: `<div class="section">
  <span class="label">Two entry points</span>
  <code>encode_response(send_buf, op, resp, is_datastar)
encode_followup(send_buf, dashboard, op, status)</code>
</div>
<div class="section">
  <span class="label">Non-SSE (full HTML page)</span>
  <code>1. Body written at header_reserve offset
2. Headers backfilled before body
3. Content-Length set from body size
4. Connection: keep-alive
Errors render empty dashboard (recovery path).</code>
</div>
<div class="section">
  <span class="label">SSE (Datastar fragments)</span>
  <code>1. Headers written from offset 0
2. SSE events: datastar-patch-elements
3. Connection: close (no keep-alive)
4. Errors: &lt;div class="error"&gt;...&lt;/div&gt;</code>
</div>
<div class="section">
  <span class="label">SSE follow-up (mutations)</span>
  <code>After mutation commit, server runs
page_load_dashboard and sends fresh
list data as SSE fragments. Same tick.</code>
</div>
<div class="section">
  <span class="label">Always 200</span>
  <code>"HTTP/1.1 200 OK\\r\\n" is a string literal
in exactly two places: backfill_headers
(non-SSE) and encode_sse_headers (SSE).
No status mapping function exists.</code>
</div>`
  },
  io_send: {
    title: 'IO Send + Connection',
    file: 'io.zig, connection.zig',
    body: `<div class="section">
  <span class="label">Process</span>
  <code>1. connection.set_response(encoded)
   -> copies to send_buf, state = .sending
2. server.flush_outbox()
   -> conn.submit_send(io)
3. io.send(fd, send_buf[pos..len])
   -> epoll_ctl(fd, EPOLLOUT)</code>
</div>
<div class="section">
  <span class="label">Partial sends</span>
  <code>TCP may accept fewer bytes.
send_callback advances send_pos.
Server tick re-submits until pos == len.</code>
</div>
<div class="section">
  <span class="label">Keep-alive</span>
  <code>After full send:
  keep_alive=true  -> shift leftover bytes,
                      state = .receiving
  keep_alive=false -> state = .closing
Non-SSE pages: keep-alive (Content-Length).
SSE streams: Connection: close.</code>
</div>`
  },
};

// Click handling
document.querySelectorAll('.stage').forEach(el => {
  el.addEventListener('click', (e) => {
    e.stopPropagation();
    const key = el.dataset.stage;
    const d = details[key];
    if (!d) return;
    const panel = document.getElementById('detail');
    document.getElementById('detail-title').textContent = d.title;
    document.getElementById('detail-file').textContent = d.file;
    document.getElementById('detail-body').innerHTML = d.body;
    panel.classList.add('visible');
  });
});

document.addEventListener('click', () => {
  document.getElementById('detail').classList.remove('visible');
});

document.getElementById('detail').addEventListener('click', (e) => {
  e.stopPropagation();
});
</script>
</body>
</html>
