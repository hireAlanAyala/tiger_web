<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tiger Web — Application Layer Graph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #c9d1d9; font-family: 'SF Mono', 'Cascadia Code', monospace; display: flex; height: 100vh; overflow: hidden; }

  #sidebar {
    width: 260px; min-width: 260px; padding: 16px; background: #161b22;
    border-right: 1px solid #21262d; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
  }
  h1 { font-size: 15px; color: #58a6ff; letter-spacing: 0.5px; }
  .subtitle { font-size: 10px; color: #484f58; margin-top: 2px; }
  h2 { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }

  .btn-group { display: flex; flex-direction: column; gap: 4px; }
  .btn {
    background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 7px 10px;
    border-radius: 4px; cursor: pointer; font-size: 11px; font-family: inherit;
    text-align: left; transition: all 0.15s;
  }
  .btn:hover { border-color: #58a6ff; background: #1c2333; }
  .btn.active { border-color: #58a6ff; background: #1c2333; color: #58a6ff; }
  .btn .cmd { display: block; color: #484f58; font-size: 9px; margin-top: 2px; }

  #status {
    background: #0d1117; border: 1px solid #21262d; border-radius: 4px;
    padding: 8px; font-size: 10px; line-height: 1.5; min-height: 60px; color: #8b949e;
  }

  .legend { display: flex; flex-direction: column; gap: 3px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 10px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-sep { height: 1px; background: #21262d; margin: 4px 0; }

  .stats { font-size: 10px; color: #484f58; }
  .stats span { color: #c9d1d9; }

  #canvas { flex: 1; position: relative; }
  svg { width: 100%; height: 100%; }

  .node circle { stroke-width: 1.5; cursor: pointer; transition: opacity 0.3s, r 0.2s; }
  .node text { pointer-events: none; font-size: 8px; fill: #c9d1d9; opacity: 0; transition: opacity 0.2s; }
  .node:hover text { opacity: 1; }
  .node:hover circle { r: 8; }
  .link { stroke-width: 0.8; stroke-opacity: 0.25; transition: stroke-opacity 0.3s, stroke 0.3s; }

  .dimmed circle { opacity: 0.08; }
  .dimmed text { opacity: 0; }
  .link.dimmed { stroke-opacity: 0.03; }
  .hit circle { opacity: 1; filter: url(#glow); }
  .hit text { opacity: 0.8; }
  .link.hit { stroke-opacity: 0.6; stroke: #58a6ff; }

  /* Entity highlight rings */
  .entity-ring { fill: none; stroke-width: 1; stroke-dasharray: 3 2; opacity: 0.3; pointer-events: none; }
</style>
</head>
<body>

<div id="sidebar">
  <div>
    <h1>Tiger Web</h1>
    <div class="subtitle">Application layer — CRUD features only</div>
    <div class="subtitle" style="color:#30363d; margin-top:4px">
      Framework (server, connection, io, http, auth) hidden
    </div>
  </div>

  <div class="stats">
    Functions: <span id="stat-nodes">0</span> |
    Calls: <span id="stat-edges">0</span> |
    Hit: <span id="stat-hit">-</span>
  </div>

  <div>
    <h2>View</h2>
    <div class="btn-group">
      <button class="btn active" data-layer="all">Show All</button>
    </div>
  </div>

  <div>
    <h2>By Entity</h2>
    <div class="btn-group">
      <button class="btn" data-layer="products">Products</button>
      <button class="btn" data-layer="collections">Collections</button>
      <button class="btn" data-layer="orders">Orders</button>
      <button class="btn" data-layer="inventory">Inventory</button>
    </div>
  </div>

  <div>
    <h2>By Operation</h2>
    <div class="btn-group">
      <button class="btn" data-layer="op-create">Create (POST)</button>
      <button class="btn" data-layer="op-read">Read (GET)</button>
      <button class="btn" data-layer="op-update">Update (PUT)</button>
      <button class="btn" data-layer="op-delete">Delete (DELETE)</button>
      <button class="btn" data-layer="op-list">List (GET)</button>
    </div>
  </div>

  <div>
    <h2>Unit Tests</h2>
    <div class="btn-group">
      <button class="btn" data-layer="unit-all">All Unit Tests
        <span class="cmd">./zig/zig build unit-test</span>
      </button>
      <button class="btn" data-layer="unit-sm">State Machine</button>
      <button class="btn" data-layer="unit-codec">Routes (Codec)</button>
      <button class="btn" data-layer="unit-storage">Storage</button>
    </div>
  </div>

  <div>
    <h2>Fuzz Tests</h2>
    <div class="btn-group">
      <button class="btn" data-layer="fuzz-sm">State Machine Fuzzer
        <span class="cmd">./zig/zig build fuzz -- state_machine</span>
      </button>
      <button class="btn" data-layer="fuzz-codec">Codec Fuzzer
        <span class="cmd">./zig/zig build fuzz -- codec</span>
      </button>
      <button class="btn" data-layer="fuzz-storage">Storage Equiv. Fuzzer
        <span class="cmd">./zig/zig build fuzz -- storage</span>
      </button>
    </div>
  </div>

  <div>
    <h2>Application Legend</h2>
    <div class="legend" id="legend"></div>
  </div>

  <div id="status">Select a view to explore CRUD operations.</div>
</div>

<div id="canvas">
  <svg id="graph">
    <defs>
      <filter id="glow">
        <feGaussianBlur stdDeviation="2.5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
  </svg>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
// Application-layer files only. Everything else is "framework".
const APP_FILES = new Set([
  "state_machine.zig",  // business logic (handlers)
  "storage.zig",        // data access (queries)
  "message.zig",        // models/types
  "codec.zig",          // routes + serialization (API surface)
]);

const FILE_META = {
  "state_machine.zig": { label: "Handlers",      color: "#ff7b72", desc: "Business logic — prefetch + execute" },
  "storage.zig":        { label: "Data Access",   color: "#ffa657", desc: "Storage queries — SQLite / memory" },
  "message.zig":        { label: "Models",        color: "#bc8cff", desc: "Types — Product, Order, Collection" },
  "codec.zig":          { label: "Routes / API",  color: "#d2a8ff", desc: "Route matching + JSON encode/decode" },
};

// Classify functions by CRUD entity based on name patterns.
function entityOf(func) {
  const f = func.toLowerCase();
  if (f.includes("order"))      return "orders";
  if (f.includes("collection") || f.includes("member")) return "collections";
  if (f.includes("transfer") || f.includes("inventory")) return "inventory";
  if (f.includes("product") || f.includes("list_param")) return "products";
  return "shared";
}

// Classify functions by CRUD operation.
function operationOf(func) {
  const f = func.toLowerCase();
  if (f.includes("create") || f.startsWith("parse_") && f.includes("json")) return "create";
  if (f.includes("update"))   return "update";
  if (f.includes("delete") || f.includes("remove")) return "delete";
  if (f.includes("list"))     return "list";
  if (f.includes("get") || f.includes("read") || f.includes("prefetch_read")) return "read";
  return null;
}

const ENTITY_COLORS = {
  "products":    "#7ee787",
  "collections": "#79c0ff",
  "orders":      "#f0883e",
  "inventory":   "#ffc658",
  "shared":      "#484f58",
};

const LAYERS = {
  "all":           { files: null, desc: "All application-layer functions" },
  "products":      { entity: "products", desc: "Product CRUD — create, read, update, delete, list, inventory" },
  "collections":   { entity: "collections", desc: "Collection CRUD — create, read, delete, add/remove members" },
  "orders":        { entity: "orders", desc: "Order CRUD — create, read, list" },
  "inventory":     { entity: "inventory", desc: "Inventory — transfer between products" },
  "op-create":     { op: "create", desc: "All create operations across entities" },
  "op-read":       { op: "read", desc: "All read/get operations across entities" },
  "op-update":     { op: "update", desc: "All update operations across entities" },
  "op-delete":     { op: "delete", desc: "All delete operations across entities" },
  "op-list":       { op: "list", desc: "All list operations across entities" },
  "unit-all":      { files: ["state_machine.zig","codec.zig","storage.zig","message.zig"], desc: "All application unit tests", storage: "both" },
  "unit-sm":       { files: ["state_machine.zig"], desc: "State machine tests — uses MemoryStorage (in-process)", storage: "memory" },
  "unit-codec":    { files: ["codec.zig"], desc: "Codec tests — route matching, JSON parsing, response encoding" },
  "unit-storage":  { files: ["storage.zig"], desc: "Storage tests — SQLite queries, read/write correctness", storage: "sqlite" },
  "fuzz-sm":       { files: ["state_machine.zig"], desc: "State machine fuzzer — uses MemoryStorage", storage: "memory" },
  "fuzz-codec":    { files: ["codec.zig"], desc: "Codec fuzzer — random HTTP methods/paths/JSON bodies" },
  "fuzz-storage":  { files: ["storage.zig","state_machine.zig"], desc: "Storage equivalence — Memory vs SQLite vs Auditor", storage: "both" },
};

let graphData, simulation, nodeElements, linkElements;
let adjacency = {};
let appNodes, appEdges;
let typeInfo = null;

Promise.all([
  fetch("graph.json").then(r => r.json()),
  fetch("types.json").then(r => r.json()),
]).then(([data, types]) => {
  typeInfo = types;
  // Filter to application-layer files only.
  const appNodeIds = new Set(data.nodes.filter(n => APP_FILES.has(n.file)).map(n => n.id));

  appNodes = data.nodes.filter(n => appNodeIds.has(n.id)).map(n => ({
    ...n,
    entity: entityOf(n.func),
    operation: operationOf(n.func),
  }));

  appEdges = data.edges.filter(e => appNodeIds.has(e.source) && appNodeIds.has(e.target));

  // Build adjacency.
  appEdges.forEach(e => {
    if (!adjacency[e.source]) adjacency[e.source] = new Set();
    adjacency[e.source].add(e.target);
  });

  graphData = { nodes: appNodes, edges: appEdges };

  document.getElementById("stat-nodes").textContent = appNodes.length;
  document.getElementById("stat-edges").textContent = appEdges.length;

  buildLegend();
  render();
  setupButtons();
});

function buildLegend() {
  const legend = document.getElementById("legend");

  // File layers.
  for (const [file, meta] of Object.entries(FILE_META)) {
    const div = document.createElement("div");
    div.className = "legend-item";
    div.innerHTML = `<div class="legend-dot" style="background:${meta.color}"></div>${meta.label} <span style="color:#484f58; font-size:9px">${meta.desc}</span>`;
    legend.appendChild(div);
  }

  // Separator.
  const sep = document.createElement("div");
  sep.className = "legend-sep";
  legend.appendChild(sep);

  // Entity colors.
  for (const [entity, color] of Object.entries(ENTITY_COLORS)) {
    if (entity === "shared") continue;
    const div = document.createElement("div");
    div.className = "legend-item";
    div.innerHTML = `<div class="legend-dot" style="background:${color}; border: 2px solid ${color}; background: transparent;"></div>${entity} <span style="color:#484f58; font-size:9px">(entity ring)</span>`;
    legend.appendChild(div);
  }
}

function render() {
  const svg = d3.select("#graph");
  const width = document.getElementById("canvas").clientWidth;
  const height = document.getElementById("canvas").clientHeight;

  // Cluster by file — give each file a target x position.
  const fileCenters = {
    "codec.zig":          { x: width * 0.2, y: height * 0.5 },
    "message.zig":        { x: width * 0.4, y: height * 0.3 },
    "state_machine.zig":  { x: width * 0.6, y: height * 0.5 },
    "storage.zig":        { x: width * 0.8, y: height * 0.5 },
  };

  simulation = d3.forceSimulation(appNodes)
    .force("link", d3.forceLink(appEdges).id(d => d.id).distance(35).strength(0.5))
    .force("charge", d3.forceManyBody().strength(-80))
    .force("collide", d3.forceCollide(10))
    .force("clusterX", d3.forceX(d => (fileCenters[d.file] || {}).x || width/2).strength(0.15))
    .force("clusterY", d3.forceY(d => (fileCenters[d.file] || {}).y || height/2).strength(0.15));

  const g = svg.append("g");
  svg.call(d3.zoom().scaleExtent([0.2, 5]).on("zoom", e => g.attr("transform", e.transform)));

  // Edges.
  linkElements = g.append("g").selectAll("line")
    .data(appEdges).join("line")
    .attr("class", "link")
    .attr("stroke", d => {
      const sn = appNodes.find(n => n.id === (d.source.id || d.source));
      const tn = appNodes.find(n => n.id === (d.target.id || d.target));
      if (sn && tn && sn.file !== tn.file) return "#58a6ff";
      return "#30363d";
    });

  // Nodes.
  nodeElements = g.append("g").selectAll("g")
    .data(appNodes).join("g")
    .attr("class", "node")
    .call(d3.drag()
      .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on("end", (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  // Entity ring (outer circle showing which entity the function belongs to).
  nodeElements.append("circle")
    .attr("r", 8)
    .attr("class", "entity-ring")
    .attr("stroke", d => ENTITY_COLORS[d.entity] || "transparent")
    .attr("opacity", d => d.entity === "shared" ? 0 : 0.3);

  // Main node circle — colored by file.
  nodeElements.append("circle")
    .attr("r", 5)
    .attr("fill", d => FILE_META[d.file]?.color || "#484f58")
    .attr("stroke", d => FILE_META[d.file]?.color || "#484f58");

  // Label.
  nodeElements.append("text")
    .attr("dx", 10).attr("dy", 3)
    .text(d => d.func);

  simulation.on("tick", () => {
    linkElements
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    nodeElements.attr("transform", d => `translate(${d.x},${d.y})`);
  });
}

function getStorageInterface() {
  return typeInfo ? new Set(typeInfo.storage_interface) : new Set();
}

function shouldExcludeEdge(edge, config) {
  if (!config || !config.storage || config.storage === "both") return false;
  const sf = (typeof edge.source === "object") ? edge.source.file : appNodes.find(n => n.id === edge.source)?.file;
  const tf = (typeof edge.target === "object") ? edge.target.file : appNodes.find(n => n.id === edge.target)?.file;
  const targetFunc = (typeof edge.target === "object") ? edge.target.func : edge.target.split(":")[1];
  if (!sf || !tf) return false;

  // Storage interface: state_machine.zig → storage.zig
  if (config.storage === "memory" && sf === "state_machine.zig" && tf === "storage.zig") {
    if (getStorageInterface().has(targetFunc)) return true;
  }
  return false;
}

function bfs(rootIds, config) {
  const visited = new Set(rootIds);
  const queue = [...rootIds];
  const edgesBySource = {};
  appEdges.forEach(e => {
    const sid = (typeof e.source === "object") ? e.source.id : e.source;
    if (!edgesBySource[sid]) edgesBySource[sid] = [];
    edgesBySource[sid].push(e);
  });

  while (queue.length > 0) {
    const current = queue.shift();
    const outEdges = edgesBySource[current] || [];
    for (const edge of outEdges) {
      if (shouldExcludeEdge(edge, config)) continue;
      const tid = (typeof edge.target === "object") ? edge.target.id : edge.target;
      if (!visited.has(tid)) {
        visited.add(tid);
        queue.push(tid);
      }
    }
  }
  return visited;
}

function highlight(layerKey) {
  const config = LAYERS[layerKey];
  if (!config) return;

  document.getElementById("status").textContent = config.desc;

  // "all" — reset.
  if (!config.files && !config.entity && !config.op) {
    nodeElements.attr("class", "node");
    linkElements.attr("class", "link");
    document.getElementById("stat-hit").textContent = appNodes.length;
    return;
  }

  let hitSet;

  if (config.entity) {
    const roots = appNodes.filter(n => n.entity === config.entity).map(n => n.id);
    hitSet = bfs(roots, config);
  } else if (config.op) {
    const roots = appNodes.filter(n => n.operation === config.op).map(n => n.id);
    hitSet = bfs(roots, config);
  } else if (config.files) {
    const roots = appNodes.filter(n => config.files.includes(n.file)).map(n => n.id);
    hitSet = bfs(roots, config);
  }

  document.getElementById("stat-hit").textContent = hitSet.size + " / " + appNodes.length;

  nodeElements.attr("class", d => hitSet.has(d.id) ? "node hit" : "node dimmed");
  linkElements.attr("class", d => {
    const sid = d.source.id || d.source;
    const tid = d.target.id || d.target;
    if (!hitSet.has(sid) || !hitSet.has(tid)) return "link dimmed";
    if (shouldExcludeEdge(d, config)) return "link dimmed";
    return "link hit";
  });
}

function setupButtons() {
  document.querySelectorAll(".btn[data-layer]").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      highlight(btn.dataset.layer);
    });
  });
  highlight("all");
}
</script>
</body>
</html>
