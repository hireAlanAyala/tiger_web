<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tiger Web — Datastar</title>
<script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@1.0.0-RC.7/bundles/datastar.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; padding: 20px; }
h1 { margin-bottom: 16px; font-size: 22px; }
h2 { margin: 20px 0 8px; font-size: 16px; border-bottom: 1px solid #ccc; padding-bottom: 4px; }
button { cursor: pointer; padding: 4px 12px; border: 1px solid #999; border-radius: 3px; background: #fff; }
button:hover { background: #eee; }
button.danger { color: #c00; }
input, select { padding: 4px 8px; border: 1px solid #ccc; border-radius: 3px; }
.row { display: flex; gap: 8px; align-items: center; margin: 6px 0; flex-wrap: wrap; }
.card { background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 12px; margin: 8px 0; }
.card .meta { font-size: 12px; color: #888; }
.error { color: #f44; }
.ok { color: #4a4; }
table { border-collapse: collapse; width: 100%; }
th, td { text-align: left; padding: 4px 8px; border-bottom: 1px solid #eee; font-size: 13px; }
th { background: #f0f0f0; }
section { margin-bottom: 24px; }
.cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 800px) { .cols { grid-template-columns: 1fr; } }
.badge { display: inline-block; font-size: 11px; padding: 1px 6px; border-radius: 8px; }
.badge-live { background: #4a4; color: #fff; }
.badge-off { background: #999; color: #fff; }
</style>
</head>
<body
  data-signals="{
    token: '{{.Token}}',
    _pName: '', _pDesc: '', _pPrice: 999, _pInv: 10,
    _pActive: '', _pPrefix: '',
    _cName: '',
    _oItems: '',
    _tSrc: '', _tDst: '', _tQty: 1,
    _sseConnected: false
  }"
  data-init="$_sseConnected = true; @get('/events?token=' + $token)"
>

<h1>Tiger Web — Datastar</h1>

<div class="row">
  <label>Token: <input data-bind:token style="width:360px"></label>
  <span data-show="$_sseConnected" class="badge badge-live">SSE live</span>
  <button data-on:click="
    @get('/products', {headers: {'Authorization': 'Bearer ' + $token}});
    @get('/collections', {headers: {'Authorization': 'Bearer ' + $token}});
    @get('/orders', {headers: {'Authorization': 'Bearer ' + $token}})
  ">Refresh All</button>
</div>

<div class="cols">
<div>

<!-- Products -->
<section>
<h2>Products</h2>
<div class="row">
  <input data-bind:_p-name placeholder="Name" style="width:120px">
  <input data-bind:_p-desc placeholder="Description" style="width:140px">
  <input data-bind:_p-price placeholder="Price (cents)" type="number" style="width:100px">
  <input data-bind:_p-inv placeholder="Inventory" type="number" style="width:80px">
  <button data-on:click="
    @post('/products', {
      headers: {'Authorization': 'Bearer ' + $token},
      payload: {
        id: uuid(), name: $_pName || 'Test Product', description: $_pDesc,
        price_cents: +$_pPrice || 999, inventory: +$_pInv || 10, active: true
      }
    })
  ">Create</button>
</div>
<div class="row">
  <label>Filter: <select data-bind:_p-active>
    <option value="">active (default)</option>
    <option value="all">all</option>
    <option value="false">inactive</option>
  </select></label>
  <input data-bind:_p-prefix placeholder="Name prefix" style="width:100px">
  <button data-on:click="
    let qs = '';
    if ($_pActive) qs += '?active=' + $_pActive;
    if ($_pPrefix) qs += (qs ? '&' : '?') + 'name_prefix=' + encodeURIComponent($_pPrefix);
    @get('/products' + qs, {headers: {'Authorization': 'Bearer ' + $token}})
  ">List</button>
</div>
<div id="product-list">
  {{.Products}}
</div>
</section>

<!-- Inventory Transfer -->
<section>
<h2>Inventory Transfer</h2>
<div class="row">
  <input data-bind:_t-src placeholder="Source product ID" style="width:260px">
  <input data-bind:_t-dst placeholder="Target product ID" style="width:260px">
  <input data-bind:_t-qty placeholder="Qty" type="number" style="width:70px">
  <button data-on:click="
    if (!$_tSrc || !$_tDst) { alert('Enter source and target product IDs'); return; }
    @post('/products/' + $_tSrc + '/transfer-inventory/' + $_tDst, {
      headers: {'Authorization': 'Bearer ' + $token},
      payload: {quantity: +$_tQty || 1}
    })
  ">Transfer</button>
</div>
</section>

</div>
<div>

<!-- Collections -->
<section>
<h2>Collections</h2>
<div class="row">
  <input data-bind:_c-name placeholder="Collection name" style="width:180px">
  <button data-on:click="
    @post('/collections', {
      headers: {'Authorization': 'Bearer ' + $token},
      payload: {id: uuid(), name: $_cName || 'Test Collection'}
    })
  ">Create</button>
  <button data-on:click="
    @get('/collections', {headers: {'Authorization': 'Bearer ' + $token}})
  ">List</button>
</div>
<div id="collection-list">
  {{.Collections}}
</div>
</section>

<!-- Orders -->
<section>
<h2>Orders
  <span data-show="$_sseConnected" class="badge badge-live">live</span>
</h2>
<div class="row">
  <input data-bind:_o-items placeholder="Product IDs (comma-sep), qty=1 each" style="width:400px">
  <button data-on:click="
    if (!$_oItems) { alert('Enter product IDs'); return; }
    const ids = $_oItems.split(',').map(s => s.trim()).filter(Boolean);
    const items = ids.map(id => ({product_id: id, quantity: 1}));
    @post('/orders', {
      headers: {'Authorization': 'Bearer ' + $token},
      payload: {id: uuid(), items}
    })
  ">Create Order</button>
  <button data-on:click="
    @get('/orders', {headers: {'Authorization': 'Bearer ' + $token}})
  ">List Orders</button>
</div>
<div id="order-list">
  {{.Orders}}
</div>
</section>

</div>
</div>

<script>
function uuid() {
  const b = new Uint8Array(16);
  crypto.getRandomValues(b);
  return Array.from(b, x => x.toString(16).padStart(2, '0')).join('');
}
</script>

</body>
</html>
