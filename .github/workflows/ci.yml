name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y libsqlite3-dev
      - run: sh zig/download.sh
      - run: ./zig/zig build ci -- test

  clients:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { example: 'ecommerce-ts', language: 'node', version: '22' }
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y libsqlite3-dev
      - run: sh zig/download.sh

      - if: matrix.language == 'node'
        uses: actions/setup-node@v4
        with: { node-version: '${{ matrix.version }}' }

      - if: matrix.language == 'python'
        uses: actions/setup-python@v4
        with: { python-version: '${{ matrix.version }}' }

      # No npm install / pip install here — scripts/ci.zig handles deps.
      # Each example is self-contained: zig build ci -- clients runs everything.
      - run: ./zig/zig build ci -- clients
