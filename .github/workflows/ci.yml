name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    strategy:
      matrix:
        include:
          - { os: 'ubuntu-latest' }
          - { os: 'macos-latest' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: sh zig/download.sh
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: ./zig/zig build ci -- test

  clients:
    strategy:
      matrix:
        include:
          - { os: 'ubuntu-latest', node: '22' }
          # macOS: test native addon loading on real hardware.
          - { os: 'macos-latest', node: '22' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: sh zig/download.sh
      - uses: actions/setup-node@v4
        with: { node-version: '${{ matrix.node }}' }
      - run: ./zig/zig build ci -- clients

  # Diagnostic: run focus dev on macOS to capture crash output.
  # Temporary — remove once the kqueue server runtime is stable.
  macos-server:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - run: sh zig/download.sh
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: ./zig/zig build
      - name: Run tiger-web server directly (bypass focus dev)
        run: |
          cd /tmp
          # Run tiger-web start directly — focus dev swallows server thread errors.
          # --sidecar creates the SHM region, --port=0 picks a random port.
          timeout 5 $GITHUB_WORKSPACE/zig-out/bin/tiger-web start --port=0 --db=:memory: --sidecar=/tmp/test.sock 2>&1 || true
          echo "exit code: $?"
