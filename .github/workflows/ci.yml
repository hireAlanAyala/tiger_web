name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Sim tests, unit tests, and fuzz smoke use SimIO — platform-
  # independent by construction. Running on macOS cost ~10× Linux
  # per minute with no additional signal (Zig is the same toolchain,
  # IO is simulated). macOS coverage for the native-addon path lives
  # in the `clients` job below, which is where platform-specific
  # breakage actually surfaces.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sh zig/download.sh
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: ./zig/zig build ci -- test

  clients:
    strategy:
      matrix:
        include:
          - { os: 'ubuntu-latest', node: '22' }
          # macOS: test native addon loading on real hardware.
          - { os: 'macos-latest', node: '22' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: sh zig/download.sh
      - uses: actions/setup-node@v4
        with: { node-version: '${{ matrix.node }}' }
      - run: ./zig/zig build ci -- clients

  # Phase F of docs/plans/benchmark-tracking.md.
  #
  # On PRs: exercises the pipeline in --dry-run (no upload). Catches
  #   parser regressions, missing metrics, compile breaks before they
  #   hit main. No PAT required.
  # On main: pushes a MetricBatch entry to hireAlanAyala/tiger-web-devhubdb
  #   via upload_run. Requires DEVHUBDB_PAT secret registered per
  #   plan's "Blocking on human" section.
  #
  # Failure on main without DEVHUBDB_PAT is loud-but-contained: only
  # this job fails, test/clients are unaffected. That's the expected
  # state until the PAT lands.
  devhub:
    runs-on: ubuntu-latest
    # Fetch full history so `git show -s --format=%ct <sha>` resolves.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: sh zig/download.sh
      - name: devhub (dry-run on PRs, real upload on main)
        env:
          DEVHUBDB_PAT: ${{ secrets.DEVHUBDB_PAT }}
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            if [ -z "$DEVHUBDB_PAT" ]; then
              # Secret not yet registered (see plan's Blocking-on-human).
              # Skip cleanly rather than fail — a red devhub job on every
              # main push trains reviewers to ignore CI red. When the
              # secret lands this branch disappears automatically.
              echo "::warning::DEVHUBDB_PAT not registered; skipping upload until the secret is in place."
              exit 0
            fi
            ./zig/zig build scripts -- devhub --sha="$SHA"
          else
            ./zig/zig build scripts -- devhub --sha="$SHA" --dry-run
          fi
