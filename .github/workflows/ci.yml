name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: sudo apt-get install -y libsqlite3-dev
      - run: sh zig/download.sh
      - run: cd examples/ecommerce-ts && npm install
      - run: ./zig/zig build ci
