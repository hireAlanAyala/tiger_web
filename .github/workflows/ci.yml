name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    strategy:
      matrix:
        include:
          - { os: 'ubuntu-latest' }
          - { os: 'macos-latest' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: sh zig/download.sh
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: ./zig/zig build ci -- test

  clients:
    strategy:
      matrix:
        include:
          - { os: 'ubuntu-latest', node: '22' }
          # macOS: test native addon loading on real hardware.
          - { os: 'macos-latest', node: '22' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: sh zig/download.sh
      - uses: actions/setup-node@v4
        with: { node-version: '${{ matrix.node }}' }
      - run: ./zig/zig build ci -- clients

  # Diagnostic: run focus dev on macOS to capture crash output.
  # Temporary — remove once the kqueue server runtime is stable.
  macos-server:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - run: sh zig/download.sh
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: ./zig/zig build
      - run: |
          FOCUS=$GITHUB_WORKSPACE/zig-out/bin/focus
          $FOCUS new --ts /tmp/macos-dev-test
          cd /tmp/macos-dev-test
          npm install
          $FOCUS build src/
          echo 'build = true' > .focus
          echo 'start = sleep 10' >> .focus
          # Run with --log-debug to see server thread errors
          $FOCUS dev --timeout=8 --log-debug src/ 2>&1 || true
          # Also test shm_open directly
          echo "--- testing shm_open ---"
          python3 -c "
          import multiprocessing.shared_memory as shm
          try:
            s = shm.SharedMemory(name='test-ci-shm', create=True, size=64)
            print('shm_open: OK (created)')
            s2 = shm.SharedMemory(name='test-ci-shm', create=False)
            print('shm_open: OK (opened)')
            s2.close()
            s.close()
            s.unlink()
          except Exception as e:
            print(f'shm_open: FAILED ({e})')
          " || true
