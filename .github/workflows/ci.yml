name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    strategy:
      matrix:
        include:
          - { os: 'ubuntu-latest' }
          - { os: 'macos-latest' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: sh zig/download.sh
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: ./zig/zig build ci -- test

  clients:
    strategy:
      matrix:
        include:
          - { os: 'ubuntu-latest', node: '22' }
          # macOS: test native addon loading on real hardware.
          - { os: 'macos-latest', node: '22' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: sh zig/download.sh
      - uses: actions/setup-node@v4
        with: { node-version: '${{ matrix.node }}' }
      - run: ./zig/zig build ci -- clients
