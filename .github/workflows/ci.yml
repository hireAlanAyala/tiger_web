name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Sim tests, unit tests, and fuzz smoke use SimIO — platform-
  # independent by construction. Running on macOS cost ~10× Linux
  # per minute with no additional signal (Zig is the same toolchain,
  # IO is simulated). macOS coverage for the native-addon path lives
  # in the `clients` job below, which is where platform-specific
  # breakage actually surfaces.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: sh zig/download.sh
      - uses: actions/setup-node@v5
        with: { node-version: '22' }
      - run: ./zig/zig build ci -- test

  clients:
    strategy:
      matrix:
        include:
          - { os: 'ubuntu-latest', node: '22' }
          # macOS: test native addon loading on real hardware.
          - { os: 'macos-latest', node: '22' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - run: sh zig/download.sh
      - uses: actions/setup-node@v5
        with: { node-version: '${{ matrix.node }}' }
      - run: ./zig/zig build ci -- clients

  # Phase F of docs/plans/benchmark-tracking.md.
  #
  # On PRs: exercises the pipeline in --dry-run (no upload). Catches
  #   parser regressions, missing metrics, compile breaks before they
  #   hit main. No PAT required.
  # On main: pushes a MetricBatch entry to hireAlanAyala/tiger-web-devhubdb
  #   via upload_run. Requires DEVHUBDB_PAT secret registered per
  #   plan's "Blocking on human" section.
  #
  # Failure on main without DEVHUBDB_PAT is loud-but-contained: only
  # this job fails, test/clients are unaffected. That's the expected
  # state until the PAT lands.
  devhub:
    # Pinned to 22.04 to match `docs/internal/benchmark-budgets.md`
    # calibration. TB's devhub job pins the same way (their
    # `.github/workflows/ci.yml:133`); `ubuntu-latest` drifts runner
    # versions from under our budgets silently.
    runs-on: ubuntu-22.04
    # Pages deploy needs `pages: write` + `id-token: write`. Concurrency
    # group "pages" prevents two main-branch deploys racing each other
    # (only one Pages site per repo; concurrent deploys would conflict).
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Fetch full history so `git show -s --format=%ct <sha>` resolves.
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # Verbatim from TB `.github/workflows/ci.yml:143`. Free up disk
      # space for benchmarking — SLA bench + kcov both land artifacts.
      - run: sudo rm -rf /usr/local/lib/android # Free up disk space for benchmarking.
      # kcov — for Phase G.0.b coverage. Runner default lacks it.
      - run: sudo apt-get update && sudo apt-get install -y kcov
      - run: sh zig/download.sh
      - name: devhub (dry-run on PRs, real upload on main)
        env:
          DEVHUBDB_PAT: ${{ secrets.DEVHUBDB_PAT }}
          NYRKIO_TOKEN: ${{ secrets.NYRKIO_TOKEN }}
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          # `sudo -E` matches TigerBeetle's devhub CI pattern: preserves
          # env (DEVHUBDB_PAT, NYRKIO_TOKEN) while bypassing the runner
          # user's git credential helpers. Belt-and-suspenders against
          # future runner-image regressions that re-intercept URL
          # credentials.
          #
          # WARNING: do NOT copy this invocation into a local
          # developer flow. Running `sudo -E zig build` locally leaves
          # zig-out/ and .zig-cache/ root-owned, breaking subsequent
          # non-sudo `zig build` with permission-denied. Safe on CI
          # (ephemeral runner); unsafe on a persistent dev machine.
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            if [ -z "$DEVHUBDB_PAT" ]; then
              # Secret not yet registered (see plan's Blocking-on-human).
              # Skip cleanly rather than fail — a red devhub job on every
              # main push trains reviewers to ignore CI red. When the
              # secret lands this branch disappears automatically.
              echo "::warning::DEVHUBDB_PAT not registered; skipping upload until the secret is in place."
              exit 0
            fi
            sudo -E ./zig/zig build scripts -- devhub --sha="$SHA"
          else
            sudo -E ./zig/zig build scripts -- devhub --sha="$SHA" --dry-run
          fi
      # Archive the coverage/ artifact produced by devhub_coverage as
      # a per-run build artifact (downloadable on every PR + main run).
      # Independent of Pages; useful for reviewers comparing coverage
      # on a PR before merge.
      - name: Archive coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 30
          if-no-files-found: ignore

      # Stage devhub/ + coverage/ into a single Pages publish dir.
      # TB-aligned single-origin Pages: dashboard at the Pages root,
      # coverage at /coverage/. Matches TB's `src/devhub/` layout
      # (their main repo serves dashboard + coverage together;
      # devhubdb is data-only).
      - name: Stage Pages publish directory
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p _site
          cp -r devhub/* _site/
          if [ -d coverage ]; then
            cp -r coverage _site/coverage
          fi
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site/
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v5
