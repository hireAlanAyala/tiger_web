<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tiger Web — Test Coverage Graph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #c9d1d9; font-family: 'SF Mono', 'Cascadia Code', monospace; display: flex; height: 100vh; overflow: hidden; }

  #sidebar {
    width: 260px; min-width: 260px; padding: 16px; background: #161b22;
    border-right: 1px solid #21262d; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
  }
  h1 { font-size: 15px; color: #58a6ff; letter-spacing: 0.5px; }
  h2 { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }

  .btn-group { display: flex; flex-direction: column; gap: 4px; }
  .btn {
    background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 7px 10px;
    border-radius: 4px; cursor: pointer; font-size: 11px; font-family: inherit;
    text-align: left; transition: all 0.15s;
  }
  .btn:hover { border-color: #58a6ff; background: #1c2333; }
  .btn.active { border-color: #58a6ff; background: #1c2333; color: #58a6ff; }
  .btn .cmd { display: block; color: #484f58; font-size: 9px; margin-top: 2px; }

  #status {
    background: #0d1117; border: 1px solid #21262d; border-radius: 4px;
    padding: 8px; font-size: 10px; line-height: 1.5; min-height: 60px; color: #8b949e;
  }
  #status.pass { border-color: #7ee787; color: #7ee787; }
  #status.fail { border-color: #ff7b72; color: #ff7b72; }

  .legend { display: flex; flex-direction: column; gap: 3px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 10px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .stats { font-size: 10px; color: #484f58; }
  .stats span { color: #c9d1d9; }

  #canvas { flex: 1; position: relative; }
  svg { width: 100%; height: 100%; }

  .node circle { stroke-width: 1.5; cursor: pointer; transition: opacity 0.3s, r 0.2s; }
  .node text { pointer-events: none; font-size: 7px; fill: #c9d1d9; opacity: 0; transition: opacity 0.2s; }
  .node:hover text { opacity: 1; }
  .node:hover circle { r: 7; }
  .link { stroke-width: 0.5; stroke-opacity: 0.3; transition: stroke-opacity 0.3s, stroke 0.3s; }

  /* Coverage states */
  .dimmed circle { opacity: 0.08; }
  .dimmed text { opacity: 0; }
  .link.dimmed { stroke-opacity: 0.03; }
  .hit circle { opacity: 1; filter: url(#glow); }
  .hit text { opacity: 0.8; }
  .link.hit { stroke-opacity: 0.6; stroke: #58a6ff; }
</style>
</head>
<body>

<div id="sidebar">
  <h1>Tiger Web</h1>
  <div class="stats">
    Nodes: <span id="stat-nodes">0</span> |
    Edges: <span id="stat-edges">0</span> |
    Hit: <span id="stat-hit">-</span>
  </div>

  <div>
    <h2>View</h2>
    <div class="btn-group">
      <button class="btn active" data-layer="all">Show All</button>
      <button class="btn" data-layer="main">From main()</button>
    </div>
  </div>

  <div>
    <h2>Unit Tests</h2>
    <div class="btn-group">
      <button class="btn" data-layer="unit-all">All Unit Tests
        <span class="cmd">./zig/zig build unit-test</span>
      </button>
      <button class="btn" data-layer="unit-http">HTTP Parser</button>
      <button class="btn" data-layer="unit-codec">Codec</button>
      <button class="btn" data-layer="unit-sm">State Machine</button>
      <button class="btn" data-layer="unit-auth">Auth</button>
      <button class="btn" data-layer="unit-storage">Storage</button>
    </div>
  </div>

  <div>
    <h2>Integration Tests</h2>
    <div class="btn-group">
      <button class="btn" data-layer="sim">Simulation (full stack)
        <span class="cmd">./zig/zig build test</span>
      </button>
    </div>
  </div>

  <div>
    <h2>Fuzz Tests</h2>
    <div class="btn-group">
      <button class="btn" data-layer="fuzz-all">All Fuzzers
        <span class="cmd">./zig/zig build fuzz -- smoke</span>
      </button>
      <button class="btn" data-layer="fuzz-sm">State Machine Fuzzer</button>
      <button class="btn" data-layer="fuzz-codec">Codec Fuzzer</button>
      <button class="btn" data-layer="fuzz-storage">Storage Equiv. Fuzzer</button>
    </div>
  </div>

  <div>
    <h2>Architecture Legend</h2>
    <div class="legend" id="legend"></div>
  </div>

  <div id="status">Select a test layer to see coverage.</div>
</div>

<div id="canvas">
  <svg id="graph">
    <defs>
      <filter id="glow">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
  </svg>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const LAYERS = {
  "main.zig":          { label: "Entry Point",   color: "#f0883e", group: "entry" },
  "server.zig":        { label: "Server",         color: "#58a6ff", group: "server" },
  "connection.zig":    { label: "Connection",     color: "#79c0ff", group: "connection" },
  "io.zig":            { label: "IO (epoll)",     color: "#56d4dd", group: "io" },
  "http.zig":          { label: "HTTP Parser",    color: "#7ee787", group: "http" },
  "codec.zig":         { label: "Codec",          color: "#d2a8ff", group: "codec" },
  "auth.zig":          { label: "Auth (JWT)",     color: "#da3633", group: "auth" },
  "state_machine.zig": { label: "State Machine",  color: "#ff7b72", group: "state_machine" },
  "storage.zig":       { label: "Storage",        color: "#ffa657", group: "storage" },
  "message.zig":       { label: "Types/Message",  color: "#bc8cff", group: "types" },
  "tracer.zig":        { label: "Tracer",         color: "#8b949e", group: "observability" },
  "time.zig":          { label: "Time",           color: "#a5d6ff", group: "types" },
  "marks.zig":         { label: "Marks",          color: "#6e7681", group: "observability" },
  "auditor.zig":       { label: "Auditor",        color: "#f778ba", group: "test_infra" },
  "fuzz.zig":          { label: "SM Fuzzer",      color: "#ff9bce", group: "test_infra" },
  "codec_fuzz.zig":    { label: "Codec Fuzzer",   color: "#ff9bce", group: "test_infra" },
  "storage_fuzz.zig":  { label: "Storage Fuzzer", color: "#ff9bce", group: "test_infra" },
  "fuzz_tests.zig":    { label: "Fuzz Dispatch",  color: "#ff9bce", group: "test_infra" },
  "fuzz_lib.zig":      { label: "Fuzz Lib",       color: "#ff9bce", group: "test_infra" },
  "sim.zig":           { label: "Sim Test",       color: "#ff9bce", group: "test_infra" },
  "prng.zig":          { label: "PRNG",           color: "#6e7681", group: "test_infra" },
  "stdx.zig":          { label: "stdx",           color: "#6e7681", group: "util" },
  "flags.zig":         { label: "Flags",          color: "#6e7681", group: "util" },
};

function nodeColor(file) {
  return (LAYERS[file] || {}).color || "#484f58";
}

// Test layer definitions: which files are "entry points" for each test layer.
// BFS from all nodes in these files gives the coverage set.
// Backend annotations: storage/io tell the BFS which generic instantiations are in use.
//   storage: "memory" = MemoryStorage (state_machine.zig), "sqlite" = SqliteStorage (storage.zig), "both" = both
//   io: "sim" = SimIO (sim.zig), "real" = IO (io.zig), null = doesn't matter (layer doesn't reach server/connection)
const TEST_LAYERS = {
  "all":           { files: null, desc: "All nodes visible" },
  "main":          { files: ["main.zig"], desc: "Production code reachable from main()", storage: "sqlite", io: "real" },
  "unit-all":      { files: ["message.zig","http.zig","codec.zig","state_machine.zig","auth.zig","storage.zig","tracer.zig","time.zig","prng.zig","marks.zig"], desc: "All unit-tested modules and their callees", storage: "both", io: null },
  "unit-http":     { files: ["http.zig"], desc: "HTTP parser unit tests", storage: null, io: null },
  "unit-codec":    { files: ["codec.zig"], desc: "Codec unit tests — route parsing, JSON encode/decode", storage: null, io: null },
  "unit-sm":       { files: ["state_machine.zig"], desc: "State machine unit tests — uses MemoryStorage (in-process)", storage: "memory", io: null },
  "unit-auth":     { files: ["auth.zig"], desc: "Auth unit tests — JWT sign/verify", storage: null, io: null },
  "unit-storage":  { files: ["storage.zig"], desc: "Storage unit tests — SQLite operations", storage: "sqlite", io: null },
  "sim":           { files: ["sim.zig"], desc: "Simulation tests — full pipeline with SimIO + MemoryStorage", storage: "memory", io: "sim" },
  "fuzz-all":      { files: ["fuzz.zig","codec_fuzz.zig","storage_fuzz.zig","fuzz_tests.zig"], desc: "All fuzzers — PRNG-driven, bypasses HTTP", storage: "both", io: null },
  "fuzz-sm":       { files: ["fuzz.zig"], desc: "State machine fuzzer — uses MemoryStorage", storage: "memory", io: null },
  "fuzz-codec":    { files: ["codec_fuzz.zig"], desc: "Codec fuzzer — random methods/paths/JSON", storage: null, io: null },
  "fuzz-storage":  { files: ["storage_fuzz.zig"], desc: "Storage equivalence fuzzer — MemoryStorage vs SQLite vs Auditor", storage: "both", io: null },
};

let graphData, simulation, nodeElements, linkElements;
let adjacency = {};  // nodeId -> Set of target nodeIds
let typeInfo = null; // from types.json — storage/io interface info

Promise.all([
  fetch("graph.json").then(r => r.json()),
  fetch("types.json").then(r => r.json()),
]).then(([data, types]) => {
  graphData = data;
  typeInfo = types;

  // Build adjacency list for BFS.
  data.edges.forEach(e => {
    if (!adjacency[e.source]) adjacency[e.source] = new Set();
    adjacency[e.source].add(e.target);
  });

  document.getElementById("stat-nodes").textContent = data.nodes.length;
  document.getElementById("stat-edges").textContent = data.edges.length;

  buildLegend();
  render(data);
  setupButtons();
});

function buildLegend() {
  const legend = document.getElementById("legend");
  const seen = new Set();
  // Show production layers first, then test infra.
  const order = ["entry","server","connection","io","http","codec","auth","state_machine","storage","types","observability","test_infra","util"];
  const items = [];
  for (const [file, info] of Object.entries(LAYERS)) {
    const key = info.group + "|" + info.color;
    if (seen.has(key)) continue;
    seen.add(key);
    items.push({ label: info.label, color: info.color, group: info.group });
  }
  items.sort((a, b) => order.indexOf(a.group) - order.indexOf(b.group));
  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "legend-item";
    div.innerHTML = `<div class="legend-dot" style="background:${item.color}"></div>${item.label}`;
    legend.appendChild(div);
  });
}

function render(data) {
  const svg = d3.select("#graph");
  const width = document.getElementById("canvas").clientWidth;
  const height = document.getElementById("canvas").clientHeight;

  // Group charge: nodes in the same file attract, different files repel.
  const fileGroups = {};
  data.nodes.forEach((n, i) => {
    if (!fileGroups[n.file]) fileGroups[n.file] = [];
    fileGroups[n.file].push(i);
  });

  simulation = d3.forceSimulation(data.nodes)
    .force("link", d3.forceLink(data.edges).id(d => d.id).distance(30).strength(0.4))
    .force("charge", d3.forceManyBody().strength(-60))
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("collide", d3.forceCollide(8))
    .force("x", d3.forceX(width / 2).strength(0.03))
    .force("y", d3.forceY(height / 2).strength(0.03));

  const g = svg.append("g");

  // Zoom.
  svg.call(d3.zoom().scaleExtent([0.2, 5]).on("zoom", e => g.attr("transform", e.transform)));

  // Edges.
  linkElements = g.append("g").selectAll("line")
    .data(data.edges).join("line")
    .attr("class", "link")
    .attr("stroke", d => {
      const sf = data.nodes.find(n => n.id === (d.source.id || d.source));
      const tf = data.nodes.find(n => n.id === (d.target.id || d.target));
      if (sf && tf && sf.file !== tf.file) return "#58a6ff";
      return "#30363d";
    });

  // Nodes.
  nodeElements = g.append("g").selectAll("g")
    .data(data.nodes).join("g")
    .attr("class", "node")
    .call(d3.drag()
      .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on("end", (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  nodeElements.append("circle")
    .attr("r", 5)
    .attr("fill", d => nodeColor(d.file))
    .attr("stroke", d => nodeColor(d.file));

  nodeElements.append("text")
    .attr("dx", 8).attr("dy", 3)
    .text(d => d.func);

  simulation.on("tick", () => {
    linkElements
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    nodeElements.attr("transform", d => `translate(${d.x},${d.y})`);
  });
}

// Build sets of interface method names for edge filtering.
function getStorageInterface() {
  return typeInfo ? new Set(typeInfo.storage_interface) : new Set();
}
function getIoInterface() {
  return typeInfo ? new Set(typeInfo.io_interface) : new Set();
}

// Check if an edge is a polymorphic storage/IO call that should be excluded.
function shouldExcludeEdge(edge, config) {
  const sf = (typeof edge.source === "object") ? edge.source.file : graphData.nodes.find(n => n.id === edge.source)?.file;
  const tf = (typeof edge.target === "object") ? edge.target.file : graphData.nodes.find(n => n.id === edge.target)?.file;
  const targetFunc = (typeof edge.target === "object") ? edge.target.func : edge.target.split(":")[1];
  if (!sf || !tf) return false;

  // Storage interface: state_machine.zig → storage.zig
  if (config.storage === "memory" && sf === "state_machine.zig" && tf === "storage.zig") {
    if (getStorageInterface().has(targetFunc)) return true;
  }
  // IO interface: server.zig/connection.zig → io.zig
  if (config.io === "sim" && (sf === "server.zig" || sf === "connection.zig") && tf === "io.zig") {
    if (getIoInterface().has(targetFunc)) return true;
  }
  return false;
}

function bfs(rootIds, config) {
  const visited = new Set(rootIds);
  const queue = [...rootIds];
  // Pre-parse edge source/target for fast lookup.
  const edgesBySource = {};
  graphData.edges.forEach(e => {
    const sid = (typeof e.source === "object") ? e.source.id : e.source;
    if (!edgesBySource[sid]) edgesBySource[sid] = [];
    edgesBySource[sid].push(e);
  });

  while (queue.length > 0) {
    const current = queue.shift();
    const outEdges = edgesBySource[current] || [];
    for (const edge of outEdges) {
      if (config && shouldExcludeEdge(edge, config)) continue;
      const tid = (typeof edge.target === "object") ? edge.target.id : edge.target;
      if (!visited.has(tid)) {
        visited.add(tid);
        queue.push(tid);
      }
    }
  }
  return visited;
}

function highlight(layer) {
  const config = TEST_LAYERS[layer];
  if (!config) return;

  document.getElementById("status").className = "";
  document.getElementById("status").textContent = config.desc;

  if (!config.files) {
    // "all" — reset everything.
    nodeElements.attr("class", "node");
    linkElements.attr("class", "link");
    document.getElementById("stat-hit").textContent = graphData.nodes.length;
    return;
  }

  // Find all nodes in entry files.
  const roots = graphData.nodes.filter(n => config.files.includes(n.file)).map(n => n.id);
  const hitSet = bfs(roots, config);

  document.getElementById("stat-hit").textContent = hitSet.size + " / " + graphData.nodes.length;

  nodeElements.attr("class", d => hitSet.has(d.id) ? "node hit" : "node dimmed");
  linkElements.attr("class", d => {
    const sid = d.source.id || d.source;
    const tid = d.target.id || d.target;
    if (!hitSet.has(sid) || !hitSet.has(tid)) return "link dimmed";
    if (config && shouldExcludeEdge(d, config)) return "link dimmed";
    return "link hit";
  });
}

function setupButtons() {
  document.querySelectorAll(".btn[data-layer]").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      highlight(btn.dataset.layer);
    });
  });
  // Default: show all.
  highlight("all");
}
</script>
</body>
</html>
